name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

jobs:
  check:
    name: Build checks
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Create backend venv + install Python dependencies
        shell: pwsh
        run: |
          python -m venv backend/venv
          backend/venv/Scripts/python -m pip install --upgrade pip
          backend/venv/Scripts/python -m pip install pyinstaller av pillow numpy

      - name: Install FFmpeg
        shell: pwsh
        run: |
          choco install ffmpeg -y
          New-Item -ItemType Directory -Force backend/bin
          Copy-Item "C:\ProgramData\chocolatey\bin\ffmpeg.exe" backend/bin/ffmpeg.exe -Force
          Copy-Item "C:\ProgramData\chocolatey\bin\ffprobe.exe" backend/bin/ffprobe.exe -Force
          
      - name: Build Python sidecar
        working-directory: frontend
        run: node scripts/build-sidecar.mjs

      - name: Verify sidecar exists
        shell: pwsh
        run: |
          dir frontend/src-tauri/bin/backend_script-x86_64-pc-windows-msvc

      - name: Check frontend build
        working-directory: frontend
        run: npm run build

      - name: Check Rust/Tauri compile
        working-directory: frontend/src-tauri
        run: cargo check