name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

jobs:
  check:
    name: Build checks
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller av pillow numpy

      - name: Build Python sidecar
        shell: pwsh
        run: |
          pyinstaller backend/app.py `
            --name backend_script `
            --onedir `
            --noconsole `
            --distpath backend/dist `
            --workpath backend/build `
            --specpath backend

          New-Item -ItemType Directory -Force frontend/src-tauri/bin/backend_script-x86_64-pc-windows-msvc

          Copy-Item backend/dist/backend_script/* `
            frontend/src-tauri/bin/backend_script-x86_64-pc-windows-msvc/ `
            -Recurse `
            -Force

      - name: Check frontend build
        working-directory: frontend
        run: npm run build

      - name: Check Rust/Tauri compile
        working-directory: frontend/src-tauri
        run: cargo check