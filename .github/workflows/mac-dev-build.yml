name: Mac Dev Build

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS DMG (${{ matrix.arch_label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch_label: apple-silicon
            rust_target: aarch64-apple-darwin
            tauri_config: tauri.macos.conf.json
            sidecar_dir: backend_script-aarch64-apple-darwin
            artifact_name: amverge-macos-arm64-dmg
          - runner: macos-13
            arch_label: intel
            rust_target: x86_64-apple-darwin
            tauri_config: tauri.macos.intel.conf.json
            sidecar_dir: backend_script-x86_64-apple-darwin
            artifact_name: amverge-macos-x64-dmg

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --include=optional

      - name: Work around npm optional dependency issue (Rollup)
        working-directory: frontend
        run: |
          ROLLUP_VERSION=$(node -e "console.log(require('rollup/package.json').version)")
          ROLLUP_ARCH=$(node -p "process.arch")
          if [ "$ROLLUP_ARCH" = "arm64" ]; then
            ROLLUP_PKG="@rollup/rollup-darwin-arm64"
          else
            ROLLUP_PKG="@rollup/rollup-darwin-x64"
          fi
          npm i --no-save "${ROLLUP_PKG}@${ROLLUP_VERSION}"

      - name: Install Tauri CLI (Rust)
        run: cargo install tauri-cli --version '^2.0'

      - name: Create backend venv and install dependencies
        run: |
          python -m venv backend/venv
          backend/venv/bin/python -m pip install --upgrade pip
          backend/venv/bin/pip install -r backend/requirements.txt
          backend/venv/bin/pip install pyinstaller

      - name: Install FFmpeg binaries
        run: |
          brew install ffmpeg
          mkdir -p backend/bin
          cp "$(which ffmpeg)" backend/bin/ffmpeg
          cp "$(which ffprobe)" backend/bin/ffprobe
          chmod +x backend/bin/ffmpeg backend/bin/ffprobe

      - name: Build Python sidecar
        working-directory: frontend
        run: node scripts/build-sidecar.mjs

      - name: Verify macOS sidecar exists
        run: ls -la frontend/src-tauri/bin/${{ matrix.sidecar_dir }}

      - name: Build macOS app bundle
        working-directory: frontend/src-tauri
        run: cargo tauri build --target ${{ matrix.rust_target }} --config ${{ matrix.tauri_config }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: frontend/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
